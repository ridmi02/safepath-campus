name: safepath_campus
description: "SafePath Campus safety application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.8 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Backend
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.1.3

  # Emergency & Safety Features
  speech_to_text: ^7.0.0
  shared_preferences: ^2.2.2
  flutter_background_service: ^5.0.0
  flutter_local_notifications: ^17.0.0
  volume_controller: ^2.0.7
  audioplayers: ^6.0.0
  flutter_vibrate: ^1.3.0


  # Location & Permissions
  geolocator: ^13.0.0
  permission_handler: ^11.4.0

  # Map
  # Pinned to 7.0.2 — flutter_map 8.x breaks Marker/MapOptions API
  flutter_map: 7.0.2
  latlong2: ^0.9.1

  # Image & Media
  image_picker: ^1.1.2

  # UI Utilities
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  url_launcher: ^6.3.1
  vibration: ^2.0.0

  # Networking
  http: ^1.2.1

  # Config
  flutter_dotenv: ^6.0.0
  flutter_webrtc: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - .env

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: "assets/icon/icon.png"
  web:
    generate: true
    background_color: "#0D1B2A"

flutter_native_splash:
  color: "#0D1B2A"
  image: assets/icon/icon.png
  android_12:
    color: "#0D1B2A"
    image: assets/icon/icon.png
  ios: true
  android: true
